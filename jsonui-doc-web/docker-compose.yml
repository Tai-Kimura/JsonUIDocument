services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jsonui-doc-web
    ports:
      - "4321:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - NODE_OPTIONS=--max-old-space-size=6144
    mem_limit: 8g
    mem_reservation: 2g
    memswap_limit: 8g
    stdin_open: true
    tty: true
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "--tries=1", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
